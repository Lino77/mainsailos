name: "Build Images"

on:
  push:
    branches:
      - "develop"
  pull_request:
    types: [opened, edited, reopened, synchronize]
    paths:
      - "modules/**"
      - ".github/workflows/build.yml"
      - "config.yml"
  workflow_dispatch:

# Erzwingt Node.js 24 für alle Actions in diesem Workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-build-${{ github.ref }}-1
  cancel-in-progress: true

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.create-matrix.outputs.matrix }}
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6

      - name: "🧰 Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: "📦 Install Python deps"
        run: python -m pip install pyyaml

      - name: "🛠 Generate matrix from config.yml"
        id: create-matrix
        shell: python
        run: |
          import os, yaml, json
          with open("config.yml", "r") as f:
              config = yaml.safe_load(f)
          matrix = {"include": config}
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              print(f"matrix={json.dumps(matrix)}", file=fh)

  build:
    needs: generate-matrix
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6

      - name: "#️⃣️ Set RELEASE_TAG from VERSION file"
        run: |
          RELEASE_TAG=$(cat VERSION | tr -d '\n')
          DATE="$(date +"%Y-%m-%d")"

          echo "DATE=${DATE}" >> $GITHUB_ENV
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV

      - name: "📁 Create directories"
        run: |
          mkdir -p build
          mkdir -p scripts

      - name: "⬇ Download Image via Torrent"
        if: ${{ endsWith(matrix.img_download_url, '.torrent') }}
        run: aria2c -d build --seed-time=0 --enable-dht=false "${{ matrix.img_download_url }}"

      - name: "⬇ Download Image via wget"
        if: ${{ !endsWith(matrix.img_download_url, '.torrent') }}
        working-directory: ./build
        run: wget ${{ matrix.img_download_url }}

      - name: "🔐 Verify image"
        working-directory: ./build
        run: curl -Ls ${{  matrix.img_hash_url }} | sha256sum -c

      - name: "🛠 Unpack and rename image"
        working-directory: ./build
        run: |
          # search for the image file in the build directory
          IMG_FILE=$(ls *.img.xz | head -n 1)
          echo "Found compressed Image file: ${IMG_FILE}"

          # extract the image file
          xz -d "${IMG_FILE}"

          DECOMPRESSED_FILE="${IMG_FILE%.xz}"
          echo "Image file: ${DECOMPRESSED_FILE}"

          # rename the image file
          mv "${DECOMPRESSED_FILE}" input.img

      - name: "📋 Copy generic and type scripts"
        run: |
          cp -r modules/generic/* scripts/
          cp -r modules/${{ matrix.type }}/* scripts/
          for file in scripts/*.disabled; do
            if [ -e "$file" ]; then
              rm "$file"
            fi
          done

      - name: "📋 Copy special modules"
        if: matrix.special_modules && toJson(matrix.special_modules) != '[]'
        run: |
          echo "Special modules found for ${{ matrix.name }}: ${{ toJson(matrix.special_modules) }}"

          # copy additional files for special modules
          if [ -d "modules/special/files" ]; then
            echo "Copying common special files..."
            cp -r modules/special/files/* scripts/files/
          fi

          # Convert JSON array to bash array
          readarray -t MODULES < <(echo '${{ toJson(matrix.special_modules) }}' | jq -r '.[]')

          for module in "${MODULES[@]}"; do
            echo "Copying module: ${module}"
            cp "modules/special/${module}" scripts/
          done

      - name: "📇 Generate config.local"
        shell: python
        run: |
          print("Generating config.local file...")
          import os, json
          env_vars = json.loads(os.environ.get("MATRIX_ENV", "{}"))
          with open("config.local", "w") as f:
              for key, value in env_vars.items():
                  if not key.startswith("EDITBASE_"):
                      key = "EDITBASE_" + key
                  f.write(f"{key}={value}\n")
        env:
          MATRIX_ENV: ${{ toJson(matrix.env) }}

      - name: "🔎 Show scripts"
        working-directory: ./scripts
        run: ls -la

      - name: "🏗 Run CustoPiZer"
        uses: OctoPrint/CustoPiZer@main
        with:
          workspace: "${{ github.workspace }}/build"
          scripts:  "${{ github.workspace }}/scripts"
          config: "${{ github.workspace }}/config.local"
          environment: '{ "RELEASE_TAG": "${{ env.RELEASE_TAG }}"}'
          custopizer: "main"

      - name: "✏ Rename image"
        working-directory: ./build
        run: |
          IMAGE="${{ env.DATE }}-RatOS-${{ matrix.name }}-${{ env.RELEASE_TAG }}.img"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

          mv output.img "${IMAGE}"

      - name: "🛠 Compressing Image"
        working-directory: ./build
        run: |
          xz -efkvz9T"$(nproc)" ${{ env.IMAGE }} || true

      - name: "🔐 Create hash"
        working-directory: ./build
        run: |
          sha256sum ${{ env.IMAGE }} > ${{ env.IMAGE }}.sha256
          sha256sum ${{ env.IMAGE }}.xz > ${{ env.IMAGE }}.xz.sha256

      - name: "📊 Get filesizes and hashes"
        id: filesizes
        if: ${{ matrix.rpi_json != null }}
        working-directory: ./build
        run: |
          echo "image=$(stat -c%s "${{ env.IMAGE }}")" >> $GITHUB_OUTPUT
          echo "zip=$(stat -c%s "${{ env.IMAGE }}.xz")" >> $GITHUB_OUTPUT
          echo "hash=$(cat "${{ env.IMAGE }}.sha256" | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: "🔧 Generate RPI JSON file"
        if: ${{ matrix.rpi_json != null }}
        shell: python
        env:
          MATRIX_CONTEXT: ${{ toJson(matrix) }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          INIT_FORMAT: ${{ matrix.env.INIT_FORMAT }}
          IMAGE_NAME: ${{ env.IMAGE }}
          REPO: ${{ github.repository }}
          DATE: ${{ env.DATE }}
          EXTRACT_SIZE: ${{ steps.filesizes.outputs.image }}
          DOWNLOAD_SIZE: ${{ steps.filesizes.outputs.zip }}
          EXTRACT_SHA256: ${{ steps.filesizes.outputs.hash }}
        run: |
          import json
          import os

          matrix = json.loads(os.environ['MATRIX_CONTEXT'])
          rpi_data = matrix['rpi_json'].copy()

          if 'name' not in rpi_data:
              rpi_data['name'] = "MainsailOS $VERSION$"
          rpi_data['name'] = rpi_data['name'].replace('$VERSION$', os.environ['RELEASE_TAG'])

          env_init_format = os.environ.get('INIT_FORMAT', '')
          if env_init_format and 'init_format' not in rpi_data:
              rpi_data['init_format'] = env_init_format

          filename = f"{os.environ['IMAGE_NAME']}.xz"
          repo = os.environ['REPO']
          release_tag = os.environ['RELEASE_TAG']
          
          
          rpi_data['url'] = f"https://github.com/{repo}/releases/download/{release_tag}/{filename}"
          rpi_data['release_date'] = os.environ['DATE']
          rpi_data['extract_size'] = int(os.environ['EXTRACT_SIZE'])
          rpi_data['image_download_size'] = int(os.environ['DOWNLOAD_SIZE'])
          rpi_data['extract_sha256'] = os.environ['EXTRACT_SHA256']

          os.makedirs('build', exist_ok=True)
          json_path = f"build/{os.environ['IMAGE_NAME']}.json"
          with open(json_path, 'w') as f:
              json.dump(rpi_data, f, indent=2)
              print(f"Generated JSON file for {json_path}")

      - name: "📋 Upload Artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.IMAGE }}-artifacts
          path: |
            build/${{ env.IMAGE }}.xz
            build/${{ env.IMAGE }}.xz.sha256
            build/${{ env.IMAGE }}.sha256
            build/${{ env.IMAGE }}.json
          if-no-files-found: ignore